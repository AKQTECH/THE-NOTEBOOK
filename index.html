<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>The Notebook</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#E668A7">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="The Notebook">
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700;9..40,800&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,700;0,9..144,900;1,9..144,400;1,9..144,700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Antonio:wght@100;400;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Caprasimo&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Host+Grotesk:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    /* AKQ palette (sourced from Visual Brand Guide v14) */
    --hot-pink:     #DA005F;
    --pink-main:    #E668A7;
    --pink-soft:    #f6d0f6;
    --pink-lighter: #FFAEF7;
    --blush:        #F1BCD7;
    --blush-pale:   #FFD4F4;
    --rose:         #f39bc9;
    --berry:        #ab5a81;
    --deep-rose:    #c55c6b;
    --coral:        #e36d61;
    --terracotta:   #ea876b;
    --salmon:       #FFAD8F;
    --orange:       #ec8f2c;
    --butter:       #F5F0C8;
    --cream:        #FEF9F5;
    --warm-white:   #fff2f1;
    --offwhite:     #FBF8FC;
    --white:        #FFFFFF;
    --celery:       #EFFBD5;
    --mint:         #bbe4c6;
    --sage:         #90BBB1;
    --olive-yellow: #B8B959;
    --periwinkle-pl:#cfd8ff;
    --periwinkle:   #b2c0f9;
    --mist:         #F0E8EF;
    --ink:          #1C1410;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{
    font-family:'DM Sans',sans-serif;
    background:var(--white);
    color:var(--ink);
    min-height:100vh;
    overflow-x:hidden;
    -webkit-tap-highlight-color:transparent;
    -webkit-font-smoothing:antialiased;
  }
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,textarea,select{font-family:inherit}
  kbd{font-family:inherit}

  .icon{width:16px;height:16px;stroke-width:1.8;stroke:currentColor;fill:none;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
  .icon-sm{width:13px;height:13px}
  .icon-xl{width:26px;height:26px}

  .page{display:flex;flex-direction:column;min-height:100vh}
  .hidden{display:none !important}
  .only-mobile{display:none}
  .only-desktop{display:initial}

  /* ─────────── MASTHEAD ─────────── */
  .c-top{
    position:relative;
    padding:30px 44px 18px;
    display:flex;align-items:center;gap:26px;
    flex-shrink:0;
  }
  .logo-tile{
    width:58px;height:58px;border-radius:14px;
    background:var(--periwinkle);
    color:var(--pink-main);
    display:flex;align-items:center;justify-content:center;
    position:relative;
    box-shadow:5px 5px 0 var(--ink);
    flex-shrink:0;
  }
  .logo-tile::before{
    content:'';position:absolute;
    top:-7px;left:-7px;
    width:18px;height:18px;border-radius:50%;
    background:var(--pink-main);
    border:2.5px solid var(--white);
    box-shadow:1px 1px 0 var(--ink);
  }
  .logo-tile svg{
    width:28px;height:28px;
    stroke:var(--pink-main);
    stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round;
  }
  .masthead{
    display:flex;flex-direction:column;gap:4px;
    transform:rotate(-1.2deg);
  }
  .masthead .title{
    font-family:'Caprasimo',cursive;
    font-weight:400;
    font-size:56px;line-height:0.95;
    color:var(--ink);letter-spacing:-0.02em;
  }
  .masthead .title u{
    text-decoration:none;
    background:linear-gradient(transparent 62%, var(--pink-soft) 62%, var(--pink-soft) 94%, transparent 94%);
    padding:0 10px;
  }
  .mast-right{
    margin-left:auto;
    display:flex;align-items:center;gap:10px;
  }
  .dbx-btn{
    display:inline-flex;align-items:center;gap:8px;
    padding:9px 14px;border-radius:999px;
    background:var(--white);color:var(--ink);
    font-family:'DM Sans',sans-serif;
    font-size:11px;font-weight:800;
    text-transform:uppercase;letter-spacing:0.14em;
    border:2px solid var(--ink);
    box-shadow:3px 3px 0 var(--ink);
    min-height:44px;
  }
  .dbx-btn .dot{
    width:8px;height:8px;border-radius:50%;
    background:#b0aeb0;flex-shrink:0;
  }
  .dbx-btn.linked .dot{background:#3bd167}
  .dbx-btn.syncing .dot{background:var(--orange);animation:pulse 1.2s infinite}
  @keyframes pulse{0%,100%{opacity:0.4}50%{opacity:1}}
  .dbx-btn:hover{transform:translate(2px,2px);box-shadow:1px 1px 0 var(--ink)}

  .info-btn{
    width:36px;height:36px;border-radius:50%;
    display:inline-flex;align-items:center;justify-content:center;
    background:var(--white);color:var(--ink);
    border:2px solid var(--ink);
    box-shadow:2px 2px 0 var(--ink);
    cursor:pointer;flex-shrink:0;
    font-family:'Fraunces',serif;font-style:italic;font-weight:700;font-size:16px;
  }
  .info-btn:hover{transform:translate(1px,1px);box-shadow:1px 1px 0 var(--ink)}

  /* ─────────── FILTERS / SEARCH / NEW ─────────── */
  .c-filters{
    padding:0 44px 18px;
    display:flex;align-items:center;gap:10px;flex-wrap:wrap;
  }
  .c-filters .eyebrow{
    font-family:'Antonio',sans-serif;
    font-size:11px;font-weight:700;
    text-transform:uppercase;letter-spacing:0.22em;
    color:var(--ink);opacity:0.7;
    margin-right:6px;
  }
  .chip{
    font-family:'DM Sans',sans-serif;
    font-weight:800;font-size:10px;
    text-transform:uppercase;letter-spacing:0.12em;
    padding:10px 14px;border-radius:999px;
    background:var(--white);color:var(--ink);
    border:2px solid var(--ink);cursor:pointer;
    transition:background 0.15s,color 0.15s,border-color 0.15s,box-shadow 0.15s;
    min-height:38px;
  }
  .chip.on{
    background:var(--pink-main);color:var(--white);
    border-color:var(--pink-main);
    box-shadow:2px 2px 0 var(--ink);
  }
  .chip-count{font-size:10px;font-weight:800;margin-left:6px;opacity:0.55}
  .chip.on .chip-count{opacity:0.85;color:var(--pink-soft)}

  .c-search{
    margin-left:auto;
    flex:0 1 280px;
    display:flex;align-items:center;gap:8px;
    background:var(--white);border-radius:999px;
    padding:9px 14px;
    border:2px solid var(--ink);
    box-shadow:3px 3px 0 var(--ink);
    min-height:42px;
  }
  .c-search input{
    flex:1;border:none;outline:none;background:transparent;
    font-size:14px;color:var(--ink);min-width:0;
  }
  .c-search input::placeholder{color:#a67695;font-weight:600}
  .c-search .icon{color:var(--ink)}

  .btn-new-badge{
    background:var(--pink-main);color:var(--white);
    padding:12px 20px;border-radius:999px;
    font-family:'Fraunces',serif;font-style:italic;font-weight:700;
    font-size:14px;
    display:inline-flex;align-items:center;gap:8px;
    border:2px solid var(--ink);
    box-shadow:3px 3px 0 var(--ink);
    transform:rotate(2.5deg);
    min-height:44px;
  }
  .btn-new-badge:hover{transform:rotate(0) translate(2px,2px);box-shadow:1px 1px 0 var(--ink)}

  /* ─────────── VIEW TOGGLE ─────────── */
  .view-toggle{
    display:inline-flex;align-items:center;
    background:var(--white);
    border:2px solid var(--ink);
    border-radius:999px;
    padding:3px;
    box-shadow:3px 3px 0 var(--ink);
    margin-left:8px;
  }
  .view-toggle button{
    font-family:'DM Sans',sans-serif;
    font-size:10px;font-weight:800;
    text-transform:uppercase;letter-spacing:0.14em;
    padding:8px 14px;border-radius:999px;
    color:var(--ink);
    display:inline-flex;align-items:center;gap:6px;
    min-height:36px;
  }
  .view-toggle button.on{
    background:var(--pink-main);color:var(--white);
  }

  /* ─────────── LIST VIEW ─────────── */
  .list-wrap{
    max-width:960px;margin:0 auto;
    display:flex;flex-direction:column;gap:6px;
  }
  .list-head{
    display:grid;
    grid-template-columns:12px minmax(0,3fr) 110px 110px 60px;
    gap:14px;align-items:center;
    padding:10px 16px;
    font-family:'DM Sans',sans-serif;
    font-size:9px;font-weight:800;
    text-transform:uppercase;letter-spacing:0.18em;
    color:var(--ink);opacity:0.5;
    border-bottom:1.5px dashed rgba(28,20,16,0.2);
  }
  .list-row{
    display:grid;
    grid-template-columns:12px minmax(0,3fr) 110px 110px 60px;
    gap:14px;align-items:center;
    padding:14px 16px;
    background:var(--white);
    border:1.5px solid transparent;
    border-radius:10px;
    cursor:pointer;
    transition:transform 0.15s, border-color 0.15s, box-shadow 0.15s;
  }
  .list-row:hover{
    transform:translateX(4px);
    border-color:var(--pink-main);
    box-shadow:2px 2px 0 var(--ink);
  }
  .list-paper-dot{
    width:12px;height:12px;border-radius:50%;
    border:1.5px solid var(--ink);
  }
  .list-title{
    font-family:'Fraunces',serif;
    font-weight:700;font-size:18px;line-height:1.2;
    color:var(--ink);letter-spacing:-0.01em;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .list-title em{font-style:italic;color:var(--pink-main)}
  .list-title .sub{
    display:block;
    font-family:'DM Sans',sans-serif;
    font-weight:500;font-size:11px;
    color:var(--ink);opacity:0.55;
    margin-top:2px;
    font-style:normal;
    letter-spacing:0;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .list-tag{
    font-family:'DM Sans',sans-serif;
    font-size:10px;font-weight:800;
    text-transform:uppercase;letter-spacing:0.14em;
    color:var(--ink);opacity:0.7;
  }
  .list-date{
    font-family:'DM Sans',sans-serif;
    font-size:11px;font-weight:700;
    color:var(--ink);opacity:0.65;
  }
  .list-wc{
    font-family:'DM Sans',sans-serif;
    font-size:11px;font-weight:800;
    color:var(--ink);opacity:0.6;
    text-align:right;
    display:flex;align-items:center;justify-content:flex-end;gap:6px;
  }
  .list-wc .star{color:var(--pink-main);font-size:13px;opacity:1}
  .list-new{
    display:flex;align-items:center;gap:12px;
    padding:18px 20px;
    margin-top:14px;
    background:var(--pink-main);color:var(--white);
    border:2px solid var(--ink);
    border-radius:14px;
    box-shadow:5px 5px 0 var(--ink);
    cursor:pointer;
    min-height:60px;
  }
  .list-new svg{stroke:var(--white)}
  .list-new .lab{
    font-family:'Fraunces',serif;
    font-style:italic;font-weight:700;font-size:17px;
  }
  .list-new .kb{
    margin-left:auto;
    font-size:10px;font-weight:800;
    text-transform:uppercase;letter-spacing:0.16em;
  }
  .list-new .kb kbd{
    background:var(--white);color:var(--pink-main);
    padding:3px 8px;border-radius:4px;margin-left:6px;
  }

  /* ─────────── BOARD ─────────── */
  .board{
    position:relative;
    flex:1;overflow-y:auto;
    padding:26px 44px 80px;
  }
  .grid{
    display:grid;
    grid-template-columns:repeat(12,1fr);
    gap:26px;
    overflow:visible;
    padding-top:20px;
    align-items:start;
  }

  .note{
    position:relative;
    padding:28px 28px 24px;
    border-radius:2px;
    grid-column:span 4;
    aspect-ratio:1 / 1;
    overflow:visible;
    box-shadow:
      2px 4px 0 rgba(28,20,16,0.08),
      0 10px 24px rgba(28,20,16,0.06);
    cursor:pointer;
    transition:transform 0.22s, box-shadow 0.22s;
  }
  .note:hover{
    transform:translateY(-3px) rotate(0) !important;
    box-shadow:
      2px 4px 0 rgba(28,20,16,0.08),
      0 18px 32px rgba(28,20,16,0.14);
    z-index:10;
  }
  .note-pin{
    position:absolute;top:-16px;left:50%;transform:translateX(-50%);
    width:26px;height:32px;pointer-events:none;z-index:2;
    filter:drop-shadow(0px 1px 1px rgba(0,0,0,0.2));
  }
  .note .tag{
    font-family:'DM Sans',sans-serif;
    font-size:10px;font-weight:800;
    text-transform:uppercase;letter-spacing:0.14em;
    color:var(--pink-main);opacity:1;
    margin-bottom:14px;
  }
  .note .n-title{
    font-family:'Host Grotesk',sans-serif;
    font-weight:800;font-size:40px;line-height:0.95;text-transform:uppercase;
    color:var(--ink);letter-spacing:-0.02em;
    margin-bottom:12px;
  }
  .note .n-title em{font-style:italic;color:var(--pink-main)}
  .note .n-excerpt{
    font-size:13px;line-height:1.6;color:var(--ink);opacity:0.82;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
    overflow:hidden;white-space:pre-wrap;
  }
  .note .n-foot{
    display:flex;justify-content:space-between;align-items:center;
    margin-top:18px;
    font-size:10px;font-weight:800;
    text-transform:uppercase;letter-spacing:0.08em;
    color:var(--pink-main);opacity:1;
  }
  .note .n-foot .star{color:var(--pink-main);font-size:13px}
  .note .n-foot .dot{
    display:none;
  }
  .sticker{
    position:absolute;bottom:-12px;right:-10px;
    background:var(--ink);color:var(--butter);
    font-family:'Antonio',sans-serif;
    font-size:10px;font-weight:700;
    text-transform:uppercase;letter-spacing:0.14em;
    padding:8px 12px;border-radius:999px;
    transform:rotate(6deg);
    box-shadow:2px 2px 0 rgba(230,104,167,0.55);z-index:2;
  }
  .sticker.today{background:var(--pink-main);color:var(--white)}
  .sticker.starred{background:var(--butter);color:var(--ink)}

  /* rotational variety */
  .note:nth-child(6n+1){transform:rotate(-1.3deg)}
  .note:nth-child(6n+2){transform:rotate(1deg)}
  .note:nth-child(6n+3){transform:rotate(-0.8deg)}
  .note:nth-child(6n+4){transform:rotate(0.6deg)}
  .note:nth-child(6n+5){transform:rotate(-1.5deg)}
  .note:nth-child(6n+6){transform:rotate(1.3deg)}

  /* New-entry super-sticker */
  .new-sticker{
    grid-column:span 4;
    background:var(--pink-main);color:var(--white);
    border-radius:14px;
    padding:32px 22px;position:relative;
    display:flex;flex-direction:column;align-items:center;
    justify-content:center;gap:16px;
    min-height:260px;
    transform:rotate(-1.5deg);
    border:3px solid var(--ink);
    box-shadow:
      5px 5px 0 var(--ink),
      0 16px 30px rgba(230,104,167,0.3);
    cursor:pointer;
  }
  .new-sticker::before{
    display:none;
    border-left:1.5px dashed rgba(28,20,16,0.3);
    border-right:1.5px dashed rgba(28,20,16,0.3);
  }
  .new-sticker .circle{
    width:74px;height:74px;border-radius:50%;
    background:var(--pink-soft);color:var(--pink-main);
    display:flex;align-items:center;justify-content:center;
    border:3px solid var(--ink);box-shadow:4px 4px 0 var(--ink);
  }
  .new-sticker .ns-a{
    font-family:'Antonio',sans-serif;
    font-size:13px;font-weight:700;
    text-transform:uppercase;letter-spacing:0.22em;
    color:var(--pink-soft);
  }
  .new-sticker .ns-b{
    font-family:'Fraunces',serif;
    font-style:italic;font-weight:900;
    font-size:32px;line-height:0.95;text-align:center;
    letter-spacing:-0.02em;color:var(--white);
  }
  .new-sticker .ns-c{
    font-size:10px;font-weight:800;
    text-transform:uppercase;letter-spacing:0.18em;
    color:var(--pink-soft);
  }
  .new-sticker .ns-c kbd{
    background:var(--white);color:var(--pink-main);
    padding:3px 8px;border-radius:4px;margin-right:2px;
  }

  /* Empty state */
  .empty-state{
    grid-column:span 12;
    padding:60px 20px;text-align:center;
    font-family:'Fraunces',serif;
    font-style:italic;font-weight:700;font-size:22px;
    color:var(--ink);opacity:0.55;
  }
  .empty-state em{color:var(--pink-main);font-style:italic}

  /* ─────────── WRITING VIEW ─────────── */
  .writing-view{
    position:fixed;inset:0;
    background:var(--cream);
    z-index:100;
    display:flex;flex-direction:column;
    overflow:auto;
  }
  .wv-bar{
    position:sticky;top:0;z-index:5;
    background:var(--cream);
    padding:18px 36px;
    display:flex;align-items:center;gap:10px;flex-wrap:wrap;
    border-bottom:1.5px dashed rgba(28,20,16,0.15);
  }
  .wv-btn{
    display:inline-flex;align-items:center;gap:8px;
    font-size:11px;font-weight:800;
    text-transform:uppercase;letter-spacing:0.14em;
    padding:10px 16px;border-radius:999px;
    background:var(--white);color:var(--ink);
    border:2px solid var(--ink);
    box-shadow:3px 3px 0 var(--ink);cursor:pointer;
    min-height:42px;
  }
  .wv-btn:hover{transform:translate(2px,2px);box-shadow:1px 1px 0 var(--ink)}
  .wv-btn.primary{background:#FFD4F4;color:var(--ink);border:2px solid var(--pink-main);font-family:'Fraunces',serif;font-style:italic;font-weight:700;font-size:13px;text-transform:none;letter-spacing:0}
  .wv-btn.primary:active{transform:translate(2px,2px);box-shadow:1px 1px 0 var(--pink-main)}
  .wv-btn.primary.saved{background:var(--salmon);color:var(--white);border-color:var(--salmon);box-shadow:none}
  .wv-btn.primary.saved:active{transform:translate(1px,1px)}
  .wv-btn.ghost[disabled]{opacity:0.4}
  .wv-btn.ghost{background:transparent;box-shadow:none}
  .wv-btn.ghost:hover{background:var(--white);box-shadow:2px 2px 0 var(--ink);transform:none}
  .wv-btn.star.on{background:var(--butter)}
  .wv-btn.danger:hover{background:#ffe0e0}

  .wv-meta{
    display:flex;align-items:center;gap:10px;
    font-size:10px;font-weight:800;
    text-transform:uppercase;letter-spacing:0.14em;
    color:var(--ink);opacity:0.7;
    margin-left:4px;
  }
  .wv-spacer{margin-left:auto}

  .wv-tag-select{
    font-size:11px;font-weight:800;
    text-transform:uppercase;letter-spacing:0.14em;
    padding:10px 14px;border-radius:999px;
    background:var(--white);color:var(--ink);
    border:2px solid var(--ink);
    box-shadow:3px 3px 0 var(--ink);
    cursor:pointer;outline:none;
    appearance:none;-webkit-appearance:none;
    background-image:url("data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%231C1410' stroke-width='2.2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpolyline points='6 9 12 15 18 9'%3E%3C/polyline%3E%3C/svg%3E");
    background-repeat:no-repeat;
    background-position:right 10px center;
    background-size:12px;
    padding-right:32px;
    min-height:42px;
  }

  .wv-page{
    flex:1;
    max-width:1080px;width:100%;
    margin:32px auto 80px;
    padding:44px 64px 60px;
    background:var(--white);
    border:1.5px solid var(--mist);
    border-radius:4px;
    box-shadow:
      2px 4px 0 rgba(28,20,16,0.08),
      0 18px 40px rgba(28,20,16,0.08);
    position:relative;
  }
  .wv-page::before{
    content:'';position:absolute;
    left:56px;top:0;bottom:0;width:1.5px;
    background:var(--pink-main);opacity:0.45;
  }
  .wv-title{
    font-family:'Antonio',sans-serif;
    font-weight:700;font-size:44px;line-height:1.05;text-transform:uppercase;
    letter-spacing:-0.02em;color:var(--ink);
    margin-bottom:24px;
    width:100%;border:none;outline:none;
    background:transparent;resize:none;display:block;
  }
  .wv-title::placeholder{color:var(--pink-main);font-style:italic;opacity:0.5}

  .wv-lines{
    width:100%;min-height:62vh;
    border:none;outline:none;
    background-color:transparent;
    overflow-y:auto;
    -webkit-overflow-scrolling:touch;
    word-wrap:break-word;
    background-image:repeating-linear-gradient(
      to bottom,
      transparent 0,
      transparent 25px,
      rgba(230,104,167,0.32) 25px,
      rgba(230,104,167,0.32) 26px,
      transparent 26px,
      transparent 34px
    );
    background-repeat:repeat-y;
    background-attachment:local;
    font-family:'DM Sans',sans-serif;
    font-size:15px;line-height:34px;
    color:var(--ink);
    padding:0 2px;
    letter-spacing:0.005em;
    display:block;
    contenteditable:true;
  }
  .wv-lines a{color:var(--pink-main);text-decoration:underline;cursor:pointer}
  .wv-lines b{font-weight:700}
  .wv-lines i{font-style:italic}
  .wv-lines u{text-decoration:underline}
  .wv-foot{
    margin-top:30px;padding-top:18px;
    border-top:1.5px dashed rgba(28,20,16,0.15);
    display:flex;justify-content:space-between;align-items:center;
    font-size:10px;font-weight:800;
    text-transform:uppercase;letter-spacing:0.14em;
    color:var(--ink);opacity:0.6;
    flex-wrap:wrap;gap:8px;
  }
  .wv-foot .star{color:var(--pink-main);opacity:1;font-size:14px}

  /* Toast */
  .toast{
    position:fixed;bottom:24px;left:50%;
    transform:translateX(-50%) translateY(20px);
    background:var(--ink);color:var(--white);
    padding:12px 20px;border-radius:999px;
    font-size:11px;font-weight:800;
    text-transform:uppercase;letter-spacing:0.14em;
    box-shadow:0 10px 30px rgba(0,0,0,0.25);
    opacity:0;pointer-events:none;
    transition:opacity 0.25s, transform 0.25s;
    z-index:200;
    max-width:calc(100vw - 32px);
    text-align:center;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  /* Dialog */
  .modal{
    position:fixed;inset:0;
    background:rgba(28,20,16,0.4);
    display:flex;align-items:center;justify-content:center;
    z-index:300;padding:20px;
  }
  .modal-card{
    background:var(--white);border:2px solid var(--ink);
    border-radius:16px;padding:28px;
    max-width:440px;width:100%;
    box-shadow:5px 5px 0 var(--ink);
    max-height:90vh;overflow-y:auto;
  }
  .modal-card h3{
    font-family:'Fraunces',serif;font-style:italic;
    font-size:26px;margin-bottom:8px;
  }
  .modal-card p{font-size:13px;line-height:1.55;opacity:0.75;margin-bottom:18px}
  .modal-card p.nobreak{opacity:0.9}

  /* Category management */
  .chip-edit{
    padding:10px 14px;min-height:38px;
    gap:6px;
    display:inline-flex;align-items:center;
    font-size:10px;font-weight:800;
    text-transform:uppercase;letter-spacing:0.12em;
    opacity:0.7;
    border:2px solid var(--ink) !important;
    background:var(--white) !important;
    box-shadow:2px 2px 0 var(--ink) !important;
    border-radius:999px;
    cursor:pointer;
  }
  .chip-edit:hover{opacity:1;transform:translate(1px,1px);box-shadow:1px 1px 0 var(--ink) !important}
  .cat-item{
    display:flex;align-items:center;gap:10px;
    padding:12px 0;
    border-bottom:1px dashed rgba(28,20,16,0.15);
    font-family:'DM Sans',sans-serif;
  }
  .cat-item:last-child{border-bottom:none}
  .cat-item .cat-name{
    flex:1;font-weight:700;font-size:14px;
    text-transform:uppercase;letter-spacing:0.08em;
  }
  .cat-item .cat-count{font-size:11px;font-weight:600;opacity:0.5}
  .cat-name{cursor:pointer;border-bottom:1px dashed transparent;transition:border-color 0.15s}
  .cat-name:hover{border-color:var(--pink-main)}
  .cat-rename-input{
    flex:1;font-weight:700;font-size:14px;
    text-transform:uppercase;letter-spacing:0.08em;
    border:none;border-bottom:2px solid var(--pink-main);
    outline:none;background:transparent;
    font-family:'DM Sans',sans-serif;
    padding:2px 0;
  }
  .cat-del-btn{
    width:28px;height:28px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;opacity:0.4;
    transition:opacity 0.15s, background 0.15s;
  }
  .cat-del-btn:hover{opacity:1;background:#ffe0e0}
  .cat-add-row{display:flex;gap:8px;margin-top:14px}
  .cat-add-row input{flex:1;padding:12px 14px;border:2px solid var(--ink);border-radius:10px;font-size:14px;outline:none;font-family:inherit}
  .cat-add-row input:focus{border-color:var(--pink-main)}
  .modal-card label{display:block;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:0.14em;opacity:0.7;margin-bottom:6px;margin-top:14px}
  .modal-card input[type="text"]{width:100%;padding:12px 14px;border:2px solid var(--ink);border-radius:10px;font-size:14px;outline:none}
  .modal-card input[type="text"]:focus{border-color:var(--pink-main)}
  .modal-actions{display:flex;gap:10px;justify-content:flex-end;flex-wrap:wrap;margin-top:20px}

  @media print{
    .wv-bar,.c-top,.c-filters,.board,.toast{display:none !important}
    .writing-view{position:static;background:var(--white)}
    .wv-page{box-shadow:none;border:none;margin:0;padding:40px 60px}
    .wv-foot{border-color:#ddd}
  }

  /* ─────────── RESPONSIVE ─────────── */
  @media (max-width:1100px){
    .note{grid-column:span 6}
    .new-sticker{grid-column:span 6}
    .masthead .title{font-size:44px}
    .wv-page{padding:32px 28px 48px;margin:18px 14px 60px}
    .wv-page::before{left:22px}
  }

  /* TABLET / small tablet */
  @media (max-width:768px){
    .c-top{padding:22px 20px 10px;gap:14px}
    .logo-tile{width:48px;height:48px;border-radius:12px}
    .logo-tile svg{width:24px;height:24px}
    .masthead .title{font-size:34px}
    .c-filters{padding:0 20px 14px;gap:8px}
    .board{padding:8px 20px 100px}
    .grid{gap:18px}
    .list-head{display:none}
    .list-row{
      grid-template-columns:12px 1fr auto 60px;
      gap:4px 10px;padding:12px 14px;
    }
    .list-row .list-paper-dot{grid-row:1 / 3;align-self:center}
    .list-row .list-title{grid-column:2 / 4}
    .list-row .list-tag{grid-column:2;grid-row:2}
    .list-row .list-date{grid-column:3;grid-row:2;opacity:0.55}
    .list-row .list-wc{grid-column:4;grid-row:1 / 3;align-self:center}
  }

  /* PHONE */
  @media (max-width:640px){
    .only-mobile{display:initial}
    .only-desktop{display:none}

    .c-top{
      padding:16px 16px 8px;
      flex-wrap:wrap;gap:12px;
    }
    .masthead{flex:1}
    .masthead .title{font-size:28px;line-height:0.98}
    .logo-tile{width:42px;height:42px}
    .logo-tile::before{width:14px;height:14px;top:-5px;left:-5px}
    .logo-tile svg{width:22px;height:22px}
    .mast-right{width:100%;margin-left:0}
    .dbx-btn{width:100%;justify-content:center;font-size:11px;padding:11px 14px}

    .c-filters{
      padding:0 16px 8px;
      flex-wrap:nowrap;
      overflow-x:auto;
      -webkit-overflow-scrolling:touch;
      scrollbar-width:none;
      gap:8px;
    }
    .c-filters::-webkit-scrollbar{display:none}
    .c-filters .eyebrow{display:none}
    .chip{flex-shrink:0;font-size:11px;padding:10px 14px}
    .view-toggle{margin-left:0;flex-shrink:0}
    .view-toggle button{padding:8px 12px;font-size:10px}

    .c-search{
      order:10;
      margin-left:0;
      width:100%;
      flex:1 1 100%;
    }

    .btn-new-badge{display:none}

    .board{padding:4px 16px 100px}
    .grid{gap:20px;grid-template-columns:1fr 1fr;padding-top:20px}
    .note{
      grid-column:span 1;
      padding:22px 22px 20px;
      aspect-ratio:1 / 1;
    }
    .note:nth-child(6n+1){transform:rotate(-0.5deg)}
    .note:nth-child(6n+2){transform:rotate(0.4deg)}
    .note:nth-child(6n+3){transform:rotate(-0.3deg)}
    .note:nth-child(6n+4){transform:rotate(0.3deg)}
    .note:nth-child(6n+5){transform:rotate(-0.6deg)}
    .note:nth-child(6n+6){transform:rotate(0.5deg)}
    .note:hover{transform:none !important}
    .note .n-title{font-size:24px}
    .note .n-excerpt{font-size:13px}
    .new-sticker{grid-column:span 1;aspect-ratio:1 / 1;min-height:auto;padding:26px 22px;transform:rotate(-0.8deg)}
    .new-sticker .ns-b{font-size:26px}

    .fab-new{
      display:flex;
      position:fixed;bottom:24px;right:20px;
      width:60px;height:60px;border-radius:50%;
      background:var(--pink-main);color:var(--white);
      border:2.5px solid var(--ink);
      box-shadow:4px 4px 0 var(--ink), 0 10px 24px rgba(230,104,167,0.4);
      align-items:center;justify-content:center;
      z-index:50;
      transform:rotate(-4deg);
    }
    .fab-new svg{width:26px;height:26px;stroke-width:2.4;stroke:var(--white);fill:none;stroke-linecap:round;stroke-linejoin:round}

    .wv-bar{
      padding:12px 14px;
      gap:6px;
    }
    .wv-meta{display:none}
    .wv-btn{font-size:10px;padding:9px 12px;min-height:40px}
    .wv-btn.primary{padding:10px 14px}
    .wv-btn.ghost svg{margin-right:0}
    .wv-btn.ghost span{display:none}
    .wv-tag-select{font-size:10px;padding:9px 28px 9px 12px;min-height:40px}

    .wv-page{
      margin:14px 10px 40px;
      padding:26px 22px 40px;
    }
    .wv-page::before{left:18px}
    .wv-title{font-size:30px;margin-bottom:16px}
    .wv-lines{min-height:calc(100vh - 280px)}
  }

  .fab-new{display:none}
</style>
</head>
<body>

<div class="page" id="board-view">

<script>
const $ = (id) => document.getElementById(id);
const STATE = {
  notes: [],
  settings: {search: '', filter: 'all', view: 'board'},
  currentNote: null
};

// ── LOAD / SAVE STATE ──
function loadState(){
  const saved = localStorage.getItem('notebook-state');
  if(saved){
    const parsed = JSON.parse(saved);
    STATE.notes = parsed.notes || [];
    STATE.settings = parsed.settings || STATE.settings;
  }
  console.log('Loaded', STATE.notes.length, 'notes');
}

function saveState(){
  localStorage.setItem('notebook-state', JSON.stringify(STATE));
}

function loadNote(id){
  return STATE.notes.find(n => n.id === id);
}

function saveNote(id, title, content, category, starred){
  const note = loadNote(id);
  if(note){
    note.title = title;
    note.content = content;
    note.category = category;
    note.starred = starred;
    note.updated = new Date().toISOString();
  } else {
    STATE.notes.unshift({
      id, title, content, category, starred,
      created: new Date().toISOString(),
      updated: new Date().toISOString()
    });
  }
  saveState();
}

function deleteNote(id){
  STATE.notes = STATE.notes.filter(n => n.id !== id);
  saveState();
}

// ── UI HELPERS ──
function $(id) { return document.getElementById(id); }

function show(el){ el.classList.remove('hidden'); }
function hide(el){ el.classList.add('hidden'); }
function cleanText(html){
  const tmp = document.createElement('div');
  tmp.innerHTML = html;
  return tmp.textContent.substring(0, 100);
}

// ── RENDER BOARD ──
function renderBoard(){
  const grid = $('grid');
  grid.innerHTML = '';
  
  let notes = STATE.notes;
  const {search, filter} = STATE.settings;
  
  // Filter
  if(filter !== 'all'){
    if(filter === 'Starred') notes = notes.filter(n => n.starred);
    else notes = notes.filter(n => n.category === filter);
  }
  
  // Search
  if(search) notes = notes.filter(n => n.title.toLowerCase().includes(search) || cleanText(n.content).toLowerCase().includes(search));
  
  if(notes.length === 0){
    grid.innerHTML = '<div class="empty-state">No notes found. <em>Start one now!</em></div>';
    return;
  }
  
  notes.forEach(note => {
    const noteEl = document.createElement('div');
    noteEl.className = 'note';
    const color = note.color || '#f6d0f6';
    noteEl.style.background = color;
    noteEl.innerHTML = `
      <div class="note-pin"><svg viewBox="0 0 24 24" style="width:100%;height:100%;fill:${note.pinColor||'#DA005F'}" preserveAspectRatio="none"><path d="M12,2C6.5,2 2,6.5 2,12S6.5,22 12,22S22,17.5 22,12S17.5,2 12,2Z"/></svg></div>
      <div class="tag">${note.category || 'General'}</div>
      <div class="n-title">${note.title || 'Untitled'}</div>
      <div class="n-excerpt">${cleanText(note.content)}</div>
      <div class="n-foot">
        <span>${note.updated ? new Date(note.updated).toLocaleDateString() : ''}</span>
        ${note.starred ? '<span class="star">★</span>' : ''}
      </div>
      ${note.updated && isToday(note.updated) ? '<div class="sticker today">Today</div>' : ''}
      ${note.starred ? '<div class="sticker starred">Starred</div>' : ''}
    `;
    noteEl.addEventListener('click', () => editNote(note.id));
    grid.appendChild(noteEl);
  });
}

function isToday(dateStr){
  const date = new Date(dateStr);
  const today = new Date();
  return date.toDateString() === today.toDateString();
}

// ── OPEN EDITOR ──
function editNote(id){
  STATE.currentNote = loadNote(id);
  const note = STATE.currentNote;
  
  $('wv-title').value = note.title;
  $('wv-lines').innerHTML = note.content || '';
  $('btn-star').classList.toggle('on', note.starred);
  
  show($('writing-view'));
  $('wv-lines').focus();
  updateWordCount();
}

function createNote(){
  const id = Date.now().toString();
  STATE.currentNote = { id, title: '', content: '', category: 'General', starred: false };
  STATE.notes.unshift(STATE.currentNote);
  editNote(id);
}

// ── SAVE EDITOR ──
function saveEditor(){
  if(!STATE.currentNote) return;
  
  const title = $('wv-title').value || 'Untitled';
  const content = $('wv-lines').innerHTML;
  const note = STATE.currentNote;
  
  saveNote(note.id, title, content, note.category, note.starred);
  hide($('writing-view'));
  renderBoard();
  renderList();
  
  const btn = $('btn-save');
  btn.textContent = 'Saved!';
  btn.classList.add('saved');
  setTimeout(() => {
    btn.textContent = 'Save';
    btn.classList.remove('saved');
  }, 1500);
}

function closeEditor(){
  saveEditor();
}

// ── WORD COUNT ──
function updateWordCount(){
  const text = $('wv-lines').textContent;
  const words = text.trim().split(/\s+/).filter(w => w).length;
  $('wv-word-count').textContent = words + ' words';
}

// ── KEYBOARD SHORTCUTS ──
document.addEventListener('keydown', (e) => {
  if((e.ctrlKey || e.metaKey) && e.key === 's'){
    e.preventDefault();
    if(!$('writing-view').classList.contains('hidden')){
      saveEditor();
    }
  }
  if((e.ctrlKey || e.metaKey) && e.key === 'n'){
    e.preventDefault();
    createNote();
  }
});

// ── EDITOR FORMATTING ──
$('wv-lines').addEventListener('keydown', (e) => {
  if((e.ctrlKey || e.metaKey) && !e.shiftKey){
    if(e.key.toLowerCase() === 'b'){
      e.preventDefault();
      document.execCommand('bold');
    } else if(e.key.toLowerCase() === 'i'){
      e.preventDefault();
      document.execCommand('italic');
    } else if(e.key.toLowerCase() === 'u'){
      e.preventDefault();
      document.execCommand('underline');
    } else if(e.key.toLowerCase() === 'k'){
      e.preventDefault();
      const url = prompt('Enter URL:');
      if(url){
        document.execCommand('createLink', false, url);
      }
    }
  }
});

// ── LINKS ARE CLICKABLE ──
$('wv-lines').addEventListener('click', (e) => {
  if(e.target.tagName === 'A'){
    e.preventDefault();
    window.open(e.target.href, '_blank');
  }
});

$('wv-lines').addEventListener('input', updateWordCount);

// ── SEARCH ──
$('search-input').addEventListener('input', (e) => {
  STATE.settings.search = e.target.value;
  renderBoard();
  renderList();
});

// ── FILTERS ──
document.addEventListener('click', (e) => {
  if(e.target.classList.contains('chip')){
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('on'));
    e.target.classList.add('on');
    STATE.settings.filter = e.target.dataset.chip;
    renderBoard();
    renderList();
  }
});

// ── VIEW TOGGLE ──
document.addEventListener('click', (e) => {
  if(e.target.closest('.view-toggle button')){
    const btn = e.target.closest('button');
    document.querySelectorAll('.view-toggle button').forEach(b => b.classList.remove('on'));
    btn.classList.add('on');
    STATE.settings.view = btn.dataset.view;
    $('grid').classList.toggle('hidden', STATE.settings.view === 'list');
    $('list-wrap').classList.toggle('hidden', STATE.settings.view !== 'list');
  }
});

// ── BUTTONS ──
$('btn-new').addEventListener('click', createNote);
$('btn-fab-new').addEventListener('click', createNote);
$('btn-list-new').addEventListener('click', createNote);
$('btn-close').addEventListener('click', closeEditor);
$('btn-save').addEventListener('click', saveEditor);
$('btn-star').addEventListener('click', (e) => {
  e.preventDefault();
  if(STATE.currentNote){
    STATE.currentNote.starred = !STATE.currentNote.starred;
    $('btn-star').classList.toggle('on');
    saveState();
  }
});

// ── RENDER LIST VIEW ──
function renderList(){
  const rows = $('list-rows');
  rows.innerHTML = '';
  
  let notes = STATE.notes;
  const {search, filter} = STATE.settings;
  
  if(filter !== 'all'){
    if(filter === 'Starred') notes = notes.filter(n => n.starred);
    else notes = notes.filter(n => n.category === filter);
  }
  
  if(search) notes = notes.filter(n => n.title.toLowerCase().includes(search));
  
  notes.forEach(note => {
    const row = document.createElement('div');
    row.className = 'list-row';
    row.innerHTML = `
      <div class="list-paper-dot" style="background:${note.color||'#f6d0f6'}"></div>
      <div class="list-title">${note.title || 'Untitled'}<span class="sub">${note.category || 'General'}</span></div>
      <div class="list-tag">${note.category || 'General'}</div>
      <div class="list-date">${note.updated ? new Date(note.updated).toLocaleDateString() : ''}</div>
      <div class="list-wc">${note.starred ? '<span class="star">★</span>' : ''}</div>
    `;
    row.addEventListener('click', () => editNote(note.id));
    rows.appendChild(row);
  });
}

// ── STARTUP ──
function boot(){
  loadState();
  renderBoard();
  renderList();
}
boot();

// Service worker
if('serviceWorker' in navigator && (location.protocol==='https:' || location.protocol==='http:')){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('service-worker.js').catch(err=>{
      console.warn('SW registration failed:',err);
    });
  });
}
</script>
